<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarSearch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-header">
        <h1>CarSearch</h1>
        <button class="burger-close" onclick="toggleSidebar()">&times;</button>
      </div>
      <div class="sidebar-actions">
        <button class="btn btn-primary btn-block" onclick="showWatchForm()">+ Add Watch</button>
      </div>
      <div id="home-row" class="watch-card" onclick="goHome()">
        <div class="watch-card-title">Feed</div>
      </div>
      <div id="activity-row" class="watch-card" onclick="showGlobalActivity()">
        <div class="watch-card-title">Poll History</div>
      </div>
      <div id="catalogue-row" class="watch-card" onclick="showCatalogue()">
        <div class="watch-card-title">Catalogue</div>
        <div class="watch-card-meta" id="catalogue-row-meta"></div>
      </div>
      <div id="settings-row" class="watch-card" onclick="showSettings()">
        <div class="watch-card-title">Settings</div>
      </div>
      <div id="watch-list"></div>
    </nav>

    <main id="content">
      <div class="topbar">
        <button class="burger-open" onclick="toggleSidebar()">&#9776;</button>
        <span class="topbar-title">CarSearch</span>
      </div>
      <!-- Empty / dashboard state -->
      <div id="view-empty" class="view active">
        <div id="feed"></div>
      </div>

      <!-- Watch detail with tabs -->
      <div id="view-watch" class="view">
        <div id="watch-header"></div>
        <div class="tab-bar" id="tab-bar">
          <button class="tab active" data-tab="vehicles" onclick="switchTab('vehicles')">Vehicles</button>
          <button class="tab" data-tab="activity" onclick="switchTab('activity')">Activity</button>
        </div>
        <div id="tab-vehicles" class="tab-content active">
          <div id="watch-stats"></div>
          <div id="poll-progress" class="poll-progress"></div>
          <div id="listing-controls"></div>
          <div id="listing-table"></div>
        </div>
        <div id="tab-activity" class="tab-content">
          <div id="activity-log"></div>
        </div>
      </div>

      <!-- Global activity (poll history across all watches) -->
      <div id="view-activity" class="view">
        <div id="global-activity"></div>
      </div>

      <!-- Catalogue -->
      <div id="view-catalogue" class="view">
        <div id="catalogue-content"></div>
      </div>

      <!-- Settings -->
      <div id="view-settings" class="view">
        <h2>Notifications</h2>
        <p class="text-muted">Get push notifications via <a href="https://ntfy.sh" target="_blank">ntfy.sh</a> when new listings appear or prices change.</p>
        <form id="settings-form" onsubmit="saveSettings(event)">
          <label>Server URL
            <input type="url" name="ntfy_url" placeholder="https://ntfy.sh">
          </label>
          <label>Topic
            <input type="text" name="ntfy_topic" placeholder="my-car-alerts">
          </label>
          <label>App URL (for notification links)
            <input type="url" name="app_url" placeholder="http://192.168.1.50:8000">
          </label>
          <button type="submit" class="btn btn-primary">Save</button>
        </form>
      </div>
    </main>
  </div>

  <!-- Watch form modal -->
  <div id="modal-overlay" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <h2 id="watch-form-title">Add Watch</h2>
      <form id="watch-form" onsubmit="submitWatch(event)">
        <input type="hidden" name="id">
        <div class="form-row">
          <label>Make
            <select name="make_id" onchange="onMakeSelected(this)" style="display:none"></select>
            <input type="text" name="make" required placeholder="e.g. skoda">
          </label>
          <label>Model
            <select name="model_id" onchange="onModelSelected(this)" style="display:none"></select>
            <input type="text" name="model" required placeholder="e.g. superb">
          </label>
        </div>
        <div class="form-row">
          <label>Location
            <select name="location" id="watch-location"></select>
          </label>
          <label>Radius (miles)
            <input type="number" name="radius" value="80" min="1" max="500" required>
          </label>
        </div>
        <div class="form-row">
          <label>Min Price <input type="number" name="min_price" placeholder="No min"></label>
          <label>Max Price <input type="number" name="max_price" placeholder="No max"></label>
        </div>
        <div class="form-row">
          <label>Min Year <input type="number" name="min_year" placeholder="No min"></label>
          <label>Max Year <input type="number" name="max_year" placeholder="No max"></label>
        </div>
        <div class="form-row">
          <label>Poll Interval (minutes)
            <input type="number" name="poll_interval_minutes" value="30" min="5">
          </label>
          <label>Start Time (HH:MM)
            <input type="time" name="poll_start_time" placeholder="e.g. 08:00">
          </label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Detail panel (vehicle or run) -->
  <div id="listing-panel" class="panel">
    <div class="panel-header">
      <h3 id="panel-title"></h3>
      <button class="btn btn-sm" onclick="closePanel()">Close</button>
    </div>
    <div id="panel-body"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
